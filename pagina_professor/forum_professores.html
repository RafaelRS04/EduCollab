<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduCollab - Fórum de Professores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="#">EduCollab - Fórum Professores</a>
    </div>
  </nav>

  <!-- Conteúdo -->
  <div class="container mt-4">
    <h2 class="mb-4">Troca de Experiências</h2>

    <!-- Formulário -->
    <div class="card p-3 mb-4">
      <h5>Nova postagem</h5>
      <form id="postForm">
        <div class="mb-3">
          <label for="titulo" class="form-label">Título</label>
          <input type="text" id="titulo" class="form-control" placeholder="Digite o título da dúvida ou experiência" required>
        </div>
        <div class="mb-3">
          <label for="conteudo" class="form-label">Conteúdo</label>
          <textarea id="conteudo" class="form-control" rows="3" placeholder="Escreva sua dúvida ou experiência" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Publicar</button>
      </form>
    </div>

    <!-- Lista de postagens -->
    <div id="postsContainer"></div>
  </div>

  <script src="scriptForum.js"></script>
</body>
</html>
