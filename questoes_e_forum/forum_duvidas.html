<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCollab - Fórum de Dúvidas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style_professor.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-white" href="home_professor.html">← Voltar</a>
            <span class="navbar-text text-white fw-bold">
                Fórum de Dúvidas
            </span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card p-4 shadow-sm mb-5">
            <h4 class="mb-3"><i class="bi bi-pencil-square me-2"></i> Crie um novo tópico</h4>
            <form id="postForm">
                <div class="mb-3">
                    <label for="postAutor" class="form-label">Seu Nome</label>
                    <input type="text" id="postAutor" class="form-control" placeholder="Ex: Luciano Rocha" required>
                </div>
                <div class="mb-3">
                    <label for="postTitulo" class="form-label">Título da Dúvida</label>
                    <input type="text" id="postTitulo" class="form-control" placeholder="Seja claro e objetivo" required>
                </div>
                <div class="mb-3">
                    <label for="postConteudo" class="form-label">Descreva sua dúvida</label>
                    <textarea id="postConteudo" class="form-control" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-send-fill me-2"></i> Publicar Tópico
                </button>
            </form>
        </div>

        <h4 class="mb-3"><i class="bi bi-chat-left-text-fill me-2"></i> Tópicos Recentes</h4>
        <div id="forumContainer" class="list-group shadow-sm">
            </div>
    </div>

    <script src="scriptForumDuvidas.js"></script>
</body>
</html>
