<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCollab - Detalhes do Tópico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style_professor.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-white" href="forum_duvidas.html">← Voltar para o Fórum</a>
            <span class="navbar-text text-white fw-bold">
                Detalhes do Tópico
            </span>
        </div>
    </nav>

    <div class="container mt-5">
        <div id="topicoContainer" class="card shadow-sm mb-4">
            </div>

        <h5 class="mb-3"><i class="bi bi-chat-dots-fill me-2"></i> Respostas</h5>
        <div id="respostasContainer" class="mb-4">
            </div>

        <div class="card p-4 shadow-sm">
            <h5 class="mb-3">Deixe sua resposta</h5>
            <form id="respostaForm">
                <div class="mb-3">
                    <label for="respostaAutor" class="form-label">Seu Nome</label>
                    <input type="text" class="form-control" id="respostaAutor" placeholder="Digite seu nome" required>
                </div>
                <div class="mb-3">
                    <label for="respostaTexto" class="form-label">Sua Resposta</label>
                    <textarea class="form-control" id="respostaTexto" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-reply-fill me-2"></i> Enviar Resposta
                </button>
            </form>
        </div>
    </div>

    <script src="scriptForumDuvidas.js"></script>
</body>
</html>
