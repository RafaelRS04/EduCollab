<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil do Professor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style_professor.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand text-white" href="home_professor.html">← Voltar</a>
    </div>
  </nav>

  <div class="container mt-5">
    <h3 class="mb-4">Editar Perfil do Professor</h3>

    <form id="perfilForm" class="card p-4 shadow-sm">
      <!-- Foto -->
      <div class="mb-3 text-center">
        <img id="fotoPreview" src="https://via.placeholder.com/100" 
             class="rounded-circle mb-3" 
             style="width:100px; height:100px; object-fit:cover;">
        <input type="file" id="foto" class="form-control">
      </div>

      <!-- Nome -->
      <div class="mb-3">
        <label for="nome" class="form-label">Nome</label>
        <input type="text" id="nome" class="form-control" placeholder="Digite seu nome" required>
      </div>

      <!-- Telefone -->
      <div class="mb-3">
        <label for="telefone" class="form-label">Telefone</label>
        <input type="tel" id="telefone" class="form-control" placeholder="(99) 99999-9999">
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label">E-mail</label>
        <input type="email" id="email" class="form-control" placeholder="professor@email.com" required>
      </div>

      <!-- Area de ensino -->
      <div class="mb-3">
        <label for="area" class="form-label">Área de Ensino</label>
        <select id="area" class="form-select" required>
          <option value="">Selecione...</option>
          <option value="Ensino Médio">Ensino Médio</option>
          <option value="Graduação">Graduação</option>
        </select>
      </div>

      <!-- Materias -->
      <div class="mb-3">
        <label for="materias" class="form-label">Matérias que Leciona</label>
        <input type="text" id="materias" class="form-control" placeholder="Ex: Matemática, Física">
      </div>

      <!-- Salvar -->
      <button type="submit" class="btn btn-primary">Salvar Alterações</button>
    </form>
  </div>

  <script src="scriptPerfil.js"></script>
  <script>
    // Carregar dados salvos ao abrir perfil
    carregarPerfilFormulario();
  </script>
</body>
</html>
