<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCollab - Banco de Questões</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style_professor.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-white" href="home_professor.html">← Voltar</a>
            <span class="navbar-text text-white fw-bold">
                Banco de Questões
            </span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card p-4 shadow-sm mb-5">
            <h4 class="mb-3">
                <i class="bi bi-plus-circle-fill me-2"></i> Adicionar Nova Questão
            </h4>
            <form id="questaoForm">
                <div class="mb-3">
                    <label for="materia" class="form-label">Matéria</label>
                    <input type="text" id="materia" class="form-control" placeholder="Ex: Matemática" required>
                </div>
                <div class="mb-3">
                    <label for="enunciado" class="form-label">Enunciado</label>
                    <textarea id="enunciado" class="form-control" rows="3" placeholder="Digite o enunciado da questão" required></textarea>
                </div>

                <label class="form-label">Alternativas</label>
                <div class="input-group mb-2">
                    <span class="input-group-text">A</span>
                    <input type="text" class="form-control" name="alternativa" placeholder="Alternativa A" required>
                </div>
                <div class="input-group mb-2">
                    <span class="input-group-text">B</span>
                    <input type="text" class="form-control" name="alternativa" placeholder="Alternativa B" required>
                </div>
                <div class="input-group mb-2">
                    <span class="input-group-text">C</span>
                    <input type="text" class="form-control" name="alternativa" placeholder="Alternativa C" required>
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text">D</span>
                    <input type="text" class="form-control" name="alternativa" placeholder="Alternativa D" required>
                </div>

                <div class="mb-3">
                    <label for="respostaCorreta" class="form-label">Resposta Correta</label>
                    <select id="respostaCorreta" class="form-select" required>
                        <option value="">Selecione a correta...</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-check-circle-fill me-2"></i> Salvar Questão
                </button>
            </form>
        </div>

        <h4 class="mb-3">
            <i class="bi bi-collection-fill me-2"></i> Questões Cadastradas
        </h4>
        <div id="listaQuestoes" class="row g-4">
            </div>
    </div>

    <script src="scriptBancoQuestoes.js"></script>
</body>
</html>
