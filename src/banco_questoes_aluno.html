<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCollab - Banco de Questões para Estudo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">

            </a>
            <span class="navbar-text fw-bold">
                Questões para Estudo
            </span>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="row mb-4">
            <div class="col-md-4">
                <input type="text" id="filtroMateria" class="form-control" placeholder="Filtrar por matéria...">

        </div>
        
        <div id="questoesAlunoContainer" class="row g-4">
            </div>

    <script src="scriptBancoQuestoes.js"></script>
    <script>
        // Chama a função para carregar a visão do aluno
        document.addEventListener('DOMContentLoaded', carregarQuestoesAluno);
    </script>

</html>
